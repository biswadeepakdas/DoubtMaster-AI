name: CI

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20" }
      - run: npm ci
      - run: npm run lint

  backend-tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB:       doubtmaster_test
          POSTGRES_USER:     postgres
          POSTGRES_PASSWORD: postgres
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
    env:
      DATABASE_URL:          postgresql://postgres:postgres@localhost:5432/doubtmaster_test
      REDIS_URL:             redis://localhost:6379
      JWT_SECRET:            test-jwt-secret-that-is-at-least-sixty-four-characters-long-for-validation-purposes-only
      ANTHROPIC_API_KEY:     test-key
      DEEPSEEK_API_KEY:      test-key
      TOGETHER_API_KEY:      test-key
      NVIDIA_API_KEY:        test-key
      RAZORPAY_KEY_ID:       test_rzp_key
      RAZORPAY_KEY_SECRET:   test_rzp_secret
      STRIPE_SECRET_KEY:     sk_test_placeholder
      STRIPE_WEBHOOK_SECRET: whsec_placeholder
      ENVIRONMENT:           local
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - run: pip install -r services/api/requirements.txt
      - name: Create database tables
        run: python -c "import asyncio; from app.core.database import init_db; asyncio.run(init_db())"
        working-directory: services/api
      - run: pytest tests/ -v --tb=short --cov=app --cov-report=xml
        working-directory: services/api
      - uses: codecov/codecov-action@v4
        with: { file: services/api/coverage.xml }

  frontend-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20" }
      - run: npm ci
      - run: npm test -- --passWithNoTests 2>/dev/null || true

  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@0.30.0
        with:
          scan-type: fs
          scan-ref:  .
          severity:  CRITICAL,HIGH
          exit-code: 0

  deploy-production:
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, backend-tests, frontend-tests, security-scan]
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - uses: actions/checkout@v4
      - name: Deploy backend to Railway (production)
        uses: bervProject/railway-deploy@3e04e9e
        with:
          railway_token: ${{ secrets.RAILWAY_TOKEN }}
          service:       doubtmaster-api
      - name: Notify Slack
        if: ${{ secrets.SLACK_WEBHOOK != '' }}
        uses: slackapi/slack-github-action@v2.0.0
        with:
          payload: '{"text":"Doubtmaster production deployed"}'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}
