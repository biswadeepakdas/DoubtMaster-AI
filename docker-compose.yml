version: "3.9"
services:
  api:
    build: ./services/api
    env_file: .env
    ports: ["8000:8000"]
    depends_on: [postgres, redis]
    volumes: ["./services/api:/app"]
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  web:
    build: ./apps/web
    env_file: .env
    ports: ["3000:3000"]
    volumes: ["./apps/web:/app", "/app/node_modules", "/app/.next"]

  openmaic:
    build: ./services/openmaic
    env_file: ./services/openmaic/.env.local
    ports: ["3001:3000"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB:       doubtmaster
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: postgres
    ports: ["5432:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]

volumes:
  pgdata:
