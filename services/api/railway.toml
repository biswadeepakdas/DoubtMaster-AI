[build]
builder        = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# Single worker — Railway scales horizontally across containers.
# Running multiple workers per container doubles memory and can cause port conflicts.
startCommand          = "sh -c 'alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port ${PORT:-8000} --workers 1'"
restartPolicyType     = "ON_FAILURE"
restartPolicyMaxRetries = 5
healthcheckPath       = "/health"
healthcheckTimeout    = 30
